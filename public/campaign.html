<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaign — D&D Session Master</title>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="top-nav">
  <a href="/" class="brand">⚔ D&D Session Master</a>
  <span class="nav-sep"></span>
  <a href="/" class="nav-link">Sessions</a>
  <a href="/encounters" class="nav-link">Encounters</a>
  <a href="/npcs" class="nav-link">NPCs</a>
  <a href="/campaign" class="nav-link nav-link-active">Campaign</a>
  <a href="/settings" class="nav-link">Settings</a>
  <div class="nav-create-wrap">
    <button class="nav-create-btn" id="nav-create-btn">+ Create New <span class="caret">▾</span></button>
    <div class="create-dropdown">
      <a href="/form">Session Plan</a>
      <a href="/encounter/new">Encounter Plan</a>
      <a href="/npc/new">NPC</a>
    </div>
  </div>
</nav>

<div class="container wide campaign-page">
  <div class="campaign-hero">
    <div>
      <h1 class="page-title">Campaign</h1>
      <p class="page-subtitle">One place to review what changed, what is still unresolved, and what the party has earned across the whole campaign.</p>
    </div>
    <div class="campaign-search-wrap">
      <input type="search" id="campaign-search" class="search-input campaign-search-input" placeholder="Search recap, threads, NPC updates, rewards, tags, or session goal…">
    </div>
  </div>

  <div id="campaign-stats" class="campaign-stats"></div>

  <div class="campaign-layout">
    <section class="campaign-column">
      <div class="section-header compact">
        <span class="section-num">01</span>
        <h2>Continuity Boards</h2>
      </div>
      <div id="campaign-boards" class="campaign-boards"></div>
    </section>

    <section class="campaign-column">
      <div class="section-header compact">
        <span class="section-num">02</span>
        <h2>Session Timeline</h2>
      </div>
      <div id="campaign-timeline" class="campaign-timeline"></div>
    </section>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/js/shortcuts.js"></script>
<script src="/js/campaign.js"></script>
<script src="/js/nav.js"></script>
</body>
</html>
