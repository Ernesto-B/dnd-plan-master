<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faction — D&D Session Master</title>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="top-nav">
  <span class="nav-sep"></span>
  <a href="/sessions" class="nav-link">Sessions</a>
  <a href="/encounters" class="nav-link">Encounters</a>
  <a href="/npcs" class="nav-link">NPCs</a>
  <a href="/locations" class="nav-link">Locations</a>
  <a href="/factions" class="nav-link nav-link-active">Factions</a>
  <a href="/settings" class="nav-link">Settings</a>
  <div class="nav-create-wrap">
    <button class="nav-create-btn" id="nav-create-btn">+ Create New <span class="caret">▾</span></button>
    <div class="create-dropdown">
      <a href="/form">Session</a>
      <a href="/encounter/new">Encounter</a>
      <a href="/npc/new">NPC</a>
      <a href="/location/new">Location</a>
      <a href="/faction/new">Faction</a>
    </div>
  </div>
</nav>

<div class="view-layout">
  <aside class="view-sidebar">
    <a href="/factions" class="sidebar-btn sidebar-back" data-tooltip="Return to the main factions list." data-icon="back">All Factions</a>
    <button class="sidebar-btn sidebar-primary hidden" id="btn-promote-draft" data-tooltip="Convert this draft into a normal faction and remove its Draft marker." data-icon="promote">Promote Draft</button>
    <button class="sidebar-btn" id="btn-edit" data-tooltip="Open this faction in the editor to change its agenda, clocks, or linked records." data-icon="edit">Edit Faction</button>
    <button class="sidebar-btn" id="btn-connections" data-tooltip="See every linked session, encounter, NPC, and location for this faction in one panel." data-icon="connections">View All Connections</button>
    <div class="sidebar-sep"></div>
    <button class="sidebar-btn" id="btn-export" data-tooltip="Export this faction as Markdown and/or PDF files." data-icon="export">Export</button>
    <button class="sidebar-btn" id="btn-export-connections" data-tooltip="Export this faction plus all linked records as separate files." data-icon="export">Export with Connections</button>
    <div class="sidebar-spacer"></div>
    <button class="sidebar-btn sidebar-danger" id="btn-delete" data-tooltip="Permanently delete this faction from the app." data-icon="delete">Delete</button>
  </aside>

  <main class="view-main">
    <div id="tags-anchor"></div>
    <div id="faction-content">
      <div class="empty-state"><p>Loading faction…</p></div>
    </div>
  </main>
</div>
<aside id="toc-nav" class="toc-nav"></aside>

<div id="toast" class="toast"></div>

<script src="/js/dialog.js"></script>
<script src="/js/tags.js"></script>
<script src="/js/shortcuts.js"></script>
<script src="/js/connections-panel.js"></script>
<script src="/js/export-dialog.js"></script>
<script src="/js/wiki-links.js"></script>
<script src="/js/faction-view.js"></script>
<script src="/js/global-search.js"></script>
<script src="/js/tab-client.js"></script>
<script src="/js/icons.js"></script>
<script src="/js/nav.js"></script>
</body>
</html>
