<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session — D&D Session Master</title>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/vendor/marked.js"></script>
</head>
<body>

<nav class="top-nav">
  <span class="nav-sep"></span>
  <a href="/sessions" class="nav-link">Sessions</a>
  <a href="/encounters" class="nav-link">Encounters</a>
  <a href="/npcs" class="nav-link">NPCs</a>
  <a href="/locations" class="nav-link">Locations</a>
  <a href="/settings" class="nav-link">Settings</a>
  <div class="nav-create-wrap">
    <button class="nav-create-btn" id="nav-create-btn">+ Create New <span class="caret">▾</span></button>
    <div class="create-dropdown">
      <a href="/form">Session</a>
      <a href="/encounter/new">Encounter</a>
      <a href="/npc/new">NPC</a>
      <a href="/location/new">Location</a>
    </div>
  </div>
</nav>

<div class="view-layout">
  <aside class="view-sidebar">
    <a href="/sessions" class="sidebar-btn sidebar-back" data-tooltip="Return to the main sessions list." data-icon="back">All Sessions</a>
    <button class="sidebar-btn sidebar-primary" id="btn-run" data-tooltip="Open the streamlined live session runner for table use." data-icon="run">Run Session</button>
    <button class="sidebar-btn sidebar-primary hidden" id="btn-promote-draft" data-tooltip="Convert this draft into a normal session and remove its Draft marker." data-icon="promote">Promote Draft</button>
    <div class="sidebar-sep"></div>
    <button class="sidebar-btn" id="btn-edit" data-tooltip="Open this session in the editor to change prep, continuity, or links." data-icon="edit">Edit Session</button>
    <button class="sidebar-btn" id="btn-dm-table" data-tooltip="Open a condensed table-facing version of this session for live play or printing." data-icon="table">DM Table</button>
    <button class="sidebar-btn" id="btn-connections" data-tooltip="See every linked NPC and encounter for this session in one clickable panel." data-icon="connections">View All Connections</button>
    <div class="sidebar-sep"></div>
    <button class="sidebar-btn" id="btn-export" data-tooltip="Export this session as Markdown and/or PDF files." data-icon="export">Export</button>
    <button class="sidebar-btn" id="btn-export-connections" data-tooltip="Export this session plus all linked encounters and NPCs as separate files." data-icon="export">Export with Connections</button>
    <div class="sidebar-spacer"></div>
    <button class="sidebar-btn sidebar-danger" id="btn-delete" data-tooltip="Permanently delete this session from the app." data-icon="delete">Delete</button>
  </aside>

  <main class="view-main">
    <div id="tags-anchor"></div>
    <div id="content">
      <div class="empty-state"><p>Loading session…</p></div>
    </div>
  </main>
</div>

<aside id="toc-nav" class="toc-nav"></aside>

<!-- DM Table Modal (slide-up sheet) -->
<div id="dm-modal" class="dm-modal" hidden aria-modal="true" role="dialog">
  <div class="dm-modal-backdrop" id="dm-modal-backdrop"></div>
  <div class="dm-modal-sheet">
    <div class="dm-modal-bar">
      <span class="dm-modal-label">DM Table</span>
      <button class="btn btn-ghost" id="btn-dm-modal-print" style="font-size:12px;padding:4px 12px;">Print</button>
      <button class="dm-modal-close" id="btn-dm-modal-close" aria-label="Close">×</button>
    </div>
    <div class="dm-modal-body" id="dm-modal-body"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/js/dialog.js"></script>
<script src="/js/tags.js"></script>
<script src="/js/shortcuts.js"></script>
<script src="/js/connections-panel.js"></script>
<script src="/js/export-dialog.js"></script>
<script src="/js/wiki-links.js"></script>
<script src="/js/view.js"></script>
<script src="/js/global-search.js"></script>
<script src="/js/tab-client.js"></script>
<script src="/js/icons.js"></script>
<script src="/js/nav.js"></script>
</body>
</html>
