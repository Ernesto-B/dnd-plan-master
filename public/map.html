<!DOCTYPE html>
<html lang="en" class="map-html">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Map — D&D Session Master</title>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="map-page">

<nav class="top-nav">
  <span class="nav-sep"></span>
  <a href="/sessions"   class="nav-link">Sessions</a>
  <a href="/encounters" class="nav-link">Encounters</a>
  <a href="/npcs"       class="nav-link">NPCs</a>
  <a href="/locations"  class="nav-link">Locations</a>
  <a href="/map"        class="nav-link nav-link-active">Map</a>
  <a href="/settings"   class="nav-link">Settings</a>
  <div class="nav-create-wrap">
    <button class="nav-create-btn" id="nav-create-btn">+ Create New <span class="caret">▾</span></button>
    <div class="create-dropdown">
      <a href="/form">Session</a>
      <a href="/encounter/new">Encounter</a>
      <a href="/npc/new">NPC</a>
      <a href="/location/new">Location</a>
    </div>
  </div>
</nav>

<div class="map-shell">
  <!-- Toolbar -->
  <div class="map-toolbar">
    <div class="map-toolbar-left">
      <button class="map-tool-btn active" id="map-btn-view" data-tooltip="View mode — hover pins for info">View</button>
      <button class="map-tool-btn" id="map-btn-edit" data-tooltip="Edit mode — click map to place pins">Edit</button>
    </div>
    <div class="map-toolbar-center">
      <button class="map-tool-btn icon-btn" id="map-btn-zoom-in"  data-tooltip="Zoom in  (+)">+</button>
      <button class="map-tool-btn icon-btn" id="map-btn-zoom-out" data-tooltip="Zoom out  (−)">−</button>
      <button class="map-tool-btn icon-btn" id="map-btn-zoom-fit" data-tooltip="Fit to window (0)">⊡</button>
    </div>
    <div class="map-toolbar-right">
      <button class="map-tool-btn" id="map-btn-remove" data-tooltip="Remove the map image and all its pins" hidden>Remove Map</button>
      <label class="map-upload-label" for="map-upload-input" data-tooltip="Upload a new map image">
        Upload Map
        <input type="file" id="map-upload-input" accept="image/png,image/jpeg,image/webp" hidden>
      </label>
    </div>
  </div>

  <!-- Viewport + side panel -->
  <div class="map-body">
    <!-- Empty state (no image yet) -->
    <div class="map-empty" id="map-empty">
      <div class="map-empty-inner">
        <div class="map-empty-icon">🗺️</div>
        <h2 class="map-empty-title">No map uploaded yet</h2>
        <p class="map-empty-sub">Click <strong>Upload Map</strong> in the toolbar to add your world map image.</p>
        <label class="btn btn-primary" for="map-upload-input">Upload Map Image</label>
      </div>
    </div>

    <!-- Map viewport (shown once image exists) -->
    <div class="map-viewport" id="map-viewport" hidden>
      <div class="map-canvas" id="map-canvas">
        <img id="map-img" class="map-img" alt="World map" draggable="false">
        <div class="map-pins-layer" id="map-pins-layer"></div>
      </div>
    </div>

    <!-- Side panel (pin edit / info) -->
    <div class="map-panel" id="map-panel" hidden>
      <div class="map-panel-head">
        <h3 class="map-panel-title" id="map-panel-title">Pin</h3>
        <button class="map-panel-close" id="map-panel-close" aria-label="Close panel">×</button>
      </div>
      <div class="map-panel-body">

        <!-- Edit mode form -->
        <div id="map-pin-edit-form">
          <label class="map-panel-label" for="map-pin-label">Label</label>
          <input class="map-panel-input" id="map-pin-label" type="text" placeholder="e.g. Ironhold Keep" maxlength="80">

          <label class="map-panel-label" for="map-pin-location">Link to Location</label>
          <select class="map-panel-select" id="map-pin-location">
            <option value="">— none —</option>
          </select>

          <div class="map-panel-actions">
            <button class="btn btn-primary btn-sm" id="map-pin-save">Save</button>
            <button class="btn btn-ghost  btn-sm" id="map-pin-delete">Delete Pin</button>
          </div>

          <div class="map-panel-goto" id="map-panel-goto" hidden>
            <a class="btn btn-ghost btn-sm" id="map-pin-location-link" href="#">View Location →</a>
          </div>
        </div>

        <!-- View mode info (read-only) -->
        <div id="map-pin-view" hidden>
          <div class="map-pin-info-name" id="map-pin-info-name"></div>
          <p class="map-pin-info-desc" id="map-pin-info-desc"></p>
          <div class="map-pin-info-tags" id="map-pin-info-tags"></div>
          <div class="map-pin-info-actions">
            <a class="btn btn-primary btn-sm" id="map-pin-info-loc-link" href="#" hidden>View Location →</a>
            <button class="btn btn-ghost btn-sm" id="map-pin-info-edit-btn">Edit Pin</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/js/shortcuts.js"></script>
<script src="/js/dialog.js"></script>
<script src="/js/map.js"></script>
<script src="/js/tab-client.js"></script>
<script src="/js/icons.js"></script>
<script src="/js/nav.js"></script>
</body>
</html>
